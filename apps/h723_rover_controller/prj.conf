CONFIG_GPIO=y
CONFIG_CPP=y

CONFIG_MAIN_STACK_SIZE=25000
CONFIG_MAIN_THREAD_PRIORITY=3

CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_NANO=n
CONFIG_PTHREAD_IPC=n

CONFIG_POSIX_API=y
CONFIG_POSIX_CLOCK=y

CONFIG_STDOUT_CONSOLE=y
CONFIG_LOG=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y

#
# libmicroros (/home/jacob/Desktop/stable-v4.1-jazzy/micro_ros_zephyr_module/modules/libmicroros)
#
CONFIG_MICROROS=y
CONFIG_APP_LINK_WITH_MICROROS=y
# CONFIG_MICROROS_TRANSPORT_SERIAL is not set
# CONFIG_MICROROS_TRANSPORT_SERIAL_USB is not set
CONFIG_MICROROS_TRANSPORT_UDP=y

# Networking config
CONFIG_NETWORKING=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=n
CONFIG_NET_IPV6=n
CONFIG_NET_IPV4=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_MAX_FDS=16
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_L2_ETHERNET=y

# Network buffers
CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=128
CONFIG_NET_BUF_TX_COUNT=64
CONFIG_NET_CONTEXT_NET_PKT_POOL=y

CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_DHCPV4=y

# Logging
CONFIG_NET_LOG=y
CONFIG_SERIAL=y
CONFIG_NET_STATISTICS=y
CONFIG_PRINTK=y
